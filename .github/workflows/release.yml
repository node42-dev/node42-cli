name: CLI Tests on npm Installations

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version of @n42/cli to test (e.g. 0.4.2 or 0.2.42)'
        required: true
        type: string

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx --no-install eslint src

      - name: Run unit tests
        run: npm test

  test:
    runs-on: ubuntu-latest
    needs: unit
    strategy:
      matrix:
        node-version: [20.x, 22.x, 'lts/*']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Global install fresh @n42/cli@${{ steps.version.outputs.version }}
        run: |
          npm install -g @n42/cli@${{ steps.version.outputs.version }}
          echo "Installed version:"
          n42 --version
          node test/asserts/validate_tests.js

      - name: Global upgrade to latest @n42/cli
        run: |
          npm install -g @n42/cli
          echo "Upgraded version:"
          n42 --version
          node test/asserts/validate_tests.js

      - name: Local install fresh @n42/cli@${{ steps.version.outputs.version }}
        run: |
          mkdir local-fresh && cd local-fresh
          npm init -y
          npm install @n42/cli@${{ steps.version.outputs.version }}
          echo "Local fresh version:"
          npx n42 --version
          node ../test/asserts/validate_tests.js
          cd ..

      - name: Local upgrade to latest @n42/cli
        run: |
          mkdir local-upgrade && cd local-upgrade
          npm init -y
          npm install @n42/cli@${{ steps.version.outputs.version }}
          npm install @n42/cli
          echo "Local upgraded version:"
          npx n42 --version
          node ../test/asserts/validate_tests.js
          cd ..

  release:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Slack notify on failure
        if: failure()
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.ALERT_SLACK_GITHUB_ACTIONS }}
          SLACK_COLOR: "#ff3333"
          SLACK_USERNAME: Node42 GitHub Bot
          SLACK_ICON_EMOJI: ":warning:"
          SLACK_TITLE: "Node42 CLI Release Failed"
          SLACK_MESSAGE: "Release ${{ github.ref_name }} failed — ${{ github.actor }}"
```

Flow is now:
```
tag push → unit (lint + npm test) → smoke tests (3 node versions) → release